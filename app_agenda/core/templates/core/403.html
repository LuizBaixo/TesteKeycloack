<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Acesso não autorizado</title><style>body{margin:0;display:grid;min-height:100vh;place-items:center;background:#f8fafc;color:#18212f;font:16px system-ui,sans-serif}.box{max-width:510px;margin:20px;padding:32px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;text-align:center}h1{margin:0 0 12px;font-size:25px}p{line-height:1.55;color:#475569}.actions{display:flex;justify-content:center;gap:10px;margin-top:20px}a,button{padding:10px 14px;border-radius:7px;font:inherit;font-weight:600;cursor:pointer}a{background:#2563eb;color:#fff;text-decoration:none}button{background:#fff;color:#334155;border:1px solid #cbd5e1}</style></head><body><main class="box"><h1>Você não tem acesso à Agenda</h1><p>Seu login foi reconhecido pelo SSO, mas sua conta não possui a role <strong>agenda_user</strong> necessária para usar esta aplicação.</p><p>Você pode acessar o To-Do List com esta conta, se possuir a role <strong>todo_user</strong>.</p><div class="actions"><form method="post" action="{% url 'oidc_logout' %}">{% csrf_token %}<button type="submit">Sair</button></form><a href="http://localhost:8002">Ir para To-Do List</a></div></main></body></html>
