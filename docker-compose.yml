services:
  keycloak-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Configure POSTGRES_PASSWORD in .env}
    volumes:
      - keycloak_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 12

  keycloak:
    image: quay.io/keycloak/keycloak:26.3
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:?Configure POSTGRES_PASSWORD in .env}
      # O navegador acessa pelo host; fixar o hostname evita issuer diferente
      # entre o fluxo público (localhost) e as chamadas internas dos apps.
      KC_HOSTNAME: localhost
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:?Configure KEYCLOAK_ADMIN in .env}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?Configure KEYCLOAK_ADMIN_PASSWORD in .env}
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy

  agenda-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agenda
      POSTGRES_USER: agenda
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Configure POSTGRES_PASSWORD in .env}
    volumes:
      - agenda_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenda -d agenda"]
      interval: 5s
      timeout: 5s
      retries: 12

  app-agenda:
    build: ./app_agenda
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    environment:
      DB_HOST: agenda-db
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Configure POSTGRES_PASSWORD in .env}
      OIDC_CLIENT_SECRET: ${AGENDA_OIDC_CLIENT_SECRET:?Configure AGENDA_OIDC_CLIENT_SECRET in .env}
    ports:
      - "8001:8000"
    volumes:
      - ./app_agenda:/app
    depends_on:
      agenda-db:
        condition: service_healthy
      keycloak:
        condition: service_started

  todo-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: todo
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Configure POSTGRES_PASSWORD in .env}
    volumes:
      - todo_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo -d todo"]
      interval: 5s
      timeout: 5s
      retries: 12

  app-todo:
    build: ./app_todo
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    environment:
      DB_HOST: todo-db
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Configure POSTGRES_PASSWORD in .env}
      OIDC_CLIENT_SECRET: ${TODO_OIDC_CLIENT_SECRET:?Configure TODO_OIDC_CLIENT_SECRET in .env}
    ports:
      - "8002:8000"
    volumes:
      - ./app_todo:/app
    depends_on:
      todo-db:
        condition: service_healthy
      keycloak:
        condition: service_started

volumes:
  keycloak_data:
  agenda_data:
  todo_data:
