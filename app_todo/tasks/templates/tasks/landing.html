<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Minhas Tarefas</title>
<style>
:root{--ink:#18212f;--muted:#64748b;--line:#e2e8f0;--brand:#7c3aed;--surface:#fff;--bg:#f8fafc}*{box-sizing:border-box}body{margin:0;display:grid;min-height:100vh;place-items:center;background:var(--bg);color:var(--ink);font:15px system-ui,sans-serif}.box{max-width:380px;margin:20px;padding:36px;background:var(--surface);border:1px solid var(--line);border-radius:12px;text-align:center;box-shadow:0 1px 2px #0f172a0d}h1{margin:0 0 8px;font-size:24px}p{color:var(--muted);line-height:1.5;margin:0 0 24px}.actions{display:flex;flex-direction:column;gap:10px}a{display:flex;align-items:center;justify-content:center;gap:10px;border-radius:7px;padding:11px 14px;font:inherit;font-weight:600;cursor:pointer;text-decoration:none}.primary{background:var(--brand);color:#fff}.google{background:#fff;color:#3c4043;border:1px solid #dadce0}.google svg{width:18px;height:18px}
</style></head><body>
<main class="box">
<h1>Minhas Tarefas</h1>
<p>Entre com sua conta ou continue com o Google para gerenciar suas tarefas.</p>
<div class="actions">
<a class="google" href="{% url 'oidc_google_login' %}">
<svg viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path><path fill="none" d="M0 0h48v48H0z"></path></svg>
Continuar com Google
</a>
<a class="primary" href="{% url 'oidc_authentication_init' %}">Entrar</a>
</div>
</main>
</body></html>
